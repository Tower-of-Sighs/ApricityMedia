plugins {
    id 'fabric-loom' version '1.15-SNAPSHOT'
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group
def javacppVersion = "1.5.13"
def ffmpegVersion = "8.0.1-1.5.13"
def nativePlatforms = [
        "linux-x86_64",
        "linux-arm64",
        "macosx-x86_64",
        "macosx-arm64",
        "windows-x86_64",
        "android-arm64",
        "android-x86_64"
]

base {
    archivesName = project.archives_base_name
}


repositories {
    maven {
        url "https://maven.sighs.cc/repository/maven-releases/"
    }
    maven {
        url "https://maven.sighs.cc/repository/maven-snapshots/"
    }
    maven {
        name = "Curse Maven"
        url = "https://www.cursemaven.com"
        content {
            includeGroup "curse.maven"
        }
    }
    maven { url "https://maven.shedaniel.me/" }
    maven {
        name = "Terraformers"
        url = "https://maven.terraformersmc.com/"
    }
}

dependencies {
    // To change the versions see the gradle.properties file
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    modImplementation("com.terraformersmc:modmenu:${rootProject.modmenu_version}")

    modImplementation "curse.maven:kubejs-238086:5853321"
    modImplementation "curse.maven:rhino-416294:6186969"
    modImplementation "dev.architectury:architectury-fabric:$rootProject.architectury_api_version"

    implementation(include("org.bytedeco:javacpp:${javacppVersion}"))
    implementation(include("org.bytedeco:ffmpeg:${ffmpegVersion}"))
    nativePlatforms.each { platform ->
        implementation(include("org.bytedeco:javacpp:${javacppVersion}:${platform}"))
        implementation(include("org.bytedeco:ffmpeg:${ffmpegVersion}:${platform}"))
    }
//    modImplementation 'com.sighs:apricityui-fabric-1.20.1:1.0.4'
    modImplementation files('libs/apricityui-fabric-1.20.1-1.0.4-hotfix.jar')
    modImplementation 'cc.sighs.oelib:OELib-fabric-1.20.1:0.2.1'
    implementation "com.electronwill.night-config:toml:3.8.3"
    implementation "cn.6tail:lunar:1.7.3"
    implementation "de.marhali:json5-java:3.0.0"
}

processResources {
    inputs.property "version", project.version
    inputs.property "minecraft_version", project.minecraft_version
    inputs.property "loader_version", project.loader_version
    filteringCharset "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version,
                "minecraft_version": project.minecraft_version,
                "loader_version": project.loader_version
    }

    exclude "assets/apricityui/apricity/apricityui/**"
}

def targetJavaVersion = 17
tasks.withType(JavaCompile).configureEach {
    // ensure that the encoding is set to UTF-8, no matter what the system default is
    // this fixes some edge cases with special characters not displaying correctly
    // see http://yodaconditions.net/blog/fix-for-java-file-encoding-problems-with-gradle.html
    // If Javadoc is generated, this must be specified in that task too.
    it.options.encoding = "UTF-8"
    if (targetJavaVersion >= 10 || JavaVersion.current().isJava10Compatible()) {
        it.options.release.set(targetJavaVersion)
    }
}

java {
    def javaVersion = JavaVersion.toVersion(targetJavaVersion)
    if (JavaVersion.current() < javaVersion) {
        toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
    }
    // Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
    // if it is present.
    // If you remove this line, sources will not be generated.
    withSourcesJar()
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.archives_base_name}" }
    }
}

def remapJarTask = tasks.named("remapJar")
def variantOutputDir = layout.buildDirectory.dir("libs")

def registerVariantJarTask = { String taskName, String classifier, String distribution, Closure<Boolean> keepEntry ->
    tasks.register(taskName, Jar) {
        dependsOn(remapJarTask)
        archiveBaseName.set(base.archivesName.get())
        archiveVersion.set(project.version.toString())
        archiveClassifier.set(classifier)
        destinationDirectory.set(variantOutputDir)
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        preserveFileTimestamps = false
        reproducibleFileOrder = true
        from({
            zipTree(remapJarTask.get().archiveFile.get().asFile)
        }) {
            includeEmptyDirs = false
            exclude { details ->
                String normalizedPath = details.path.replace("\\", "/")
                return !keepEntry.call(normalizedPath)
            }
        }
        manifest {
            attributes(
                    "AUIVideo-Distribution": distribution
            )
        }
    }
}

registerVariantJarTask(
        "jarFullVariant",
        "full",
        "full",
        { String path -> true }
)

registerVariantJarTask(
        "jarDownloaderVariant",
        "downloader",
        "downloader",
        { String path ->
            if (!path.startsWith("META-INF/jars/")) return true
            if (path.contains("javacpp-") && !nativePlatforms.any { suffix -> path.contains("-${suffix}.jar") }) return true
            if (path.contains("ffmpeg-") && !nativePlatforms.any { suffix -> path.contains("-${suffix}.jar") }) return true
            return !(path.contains("javacpp-") || path.contains("ffmpeg-"))
        }
)

nativePlatforms.each { platform ->
    String suffix = platform.replace("-", "_").replace(".", "_")
    registerVariantJarTask(
            "jarPlatformVariant_${suffix}",
            "platform-${platform}",
            "platform-${platform}",
            { String path ->
                if (!path.startsWith("META-INF/jars/")) return true
                if (path.contains("javacpp-") || path.contains("ffmpeg-")) {
                    if (!nativePlatforms.any { marker -> path.contains("-${marker}.jar") }) return true
                    return path.contains("-${platform}.jar")
                }
                return true
            }
    )
}

tasks.register("buildDistVariants") {
    dependsOn("jarFullVariant")
    dependsOn("jarDownloaderVariant")
    nativePlatforms.each { platform ->
        dependsOn("jarPlatformVariant_${platform.replace("-", "_").replace(".", "_")}")
    }
}

tasks.named("build") {
    dependsOn("buildDistVariants")
}

// configure the maven publication
publishing {
    publications {
        create("mavenJava", MavenPublication) {
            artifactId = project.archives_base_name
            from components.java
        }
    }

    // See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
    repositories {
        // Add repositories to publish to here.
        // Notice: This block does NOT have the same function as the block in the top level.
        // The repositories here will be used for publishing your artifact, not for
        // retrieving dependencies.
    }
}
