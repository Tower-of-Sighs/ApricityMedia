# 这里的 modLoader 和 loaderVersion 是固定写法
modLoader="javafml"
loaderVersion="${loader_version_range}"

# 对应 fabric.mod.json 的 license
license="${mod_license}"

# 对应 fabric.mod.json 的 contact
#issueTrackerURL="https://github.com/..."

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="icon.png"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies."${mod_id}"]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="apricityui"
mandatory=true
versionRange="*"
ordering="AFTER"
side="BOTH"