<body>
<div id="panel">
  <div id="header">
    <div id="titleGroup">
      <div id="title">ApricityUI Media Demo</div>
      <div id="subtitle">FFmpeg local + network streaming</div>
    </div>
    <div id="hint">V</div>
  </div>

  <div id="preview">
    <video autoplay decode-width="1280" drop-frames="true" hls-policy="auto" id="demoVideo" loop max-fps="0" muted paused="true" preload="none" src="demo.mp4"></video>
    <div id="previewOverlay">
      <div id="overlayTitle">预览</div>
      <div id="status">就绪</div>
      <div id="timeDisplay" style="font-size:10px;color:rgba(234,240,255,0.5);margin-top:2px;"></div>
    </div>
  </div>

  <div id="actions">
    <div class="btn primary" id="btnVideo">播放本地视频</div>
    <div class="btn" id="btnAudio">播放本地音频</div>
  </div>

  <div id="actionsNetwork">
    <div class="btn subtle" id="btnNetVideo">播放网络视频</div>
    <div class="btn subtle" id="btnNetAudio">播放网络音频</div>
  </div>

  <audio autoplay id="demoAudio" loop paused="true" preload="none" src="demo.mp3" volume="1"></audio>
  <audio autoplay hls-policy="auto" id="demoNetAudio" loop network-buffer-kb="768" network-reconnect="true" network-timeout-ms="8000" paused="true" preload="metadata" src="" volume="1"></audio>
</div>
</body>

<style>
  body {
    margin: 0;
    padding: 0;
  }

  #panel {
    width: 382px;
    padding: 14px 14px 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: stretch;
    overflow: hidden;
    border-radius: 16px;
    background-color: rgba(12, 14, 18, 0.74);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0px 14px 38px rgba(0, 0, 0, 0.45);
  }

  #header {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  #titleGroup {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
  }

  #title {
    font-size: 15px;
    font-weight: 800;
    color: #EAF0FF;
  }

  #subtitle {
    margin-top: 2px;
    font-size: 11px;
    color: rgba(234, 240, 255, 0.65);
  }

  #hint {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 999px;
    background-color: rgba(255, 255, 255, 0.08);
    color: rgba(234, 240, 255, 0.82);
  }

  #preview {
    width: 100%;
    height: 204px;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    background-color: rgba(0, 0, 0, 0.25);
    background-image: linear-gradient(135deg, rgba(105, 125, 255, 0.35), rgba(16, 18, 22, 0.65));
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  #demoVideo {
    width: 100%;
    height: 100%;
    position: absolute;
    left: 0;
    top: 0;
  }

  #previewOverlay {
    position: absolute;
    left: 0;
    top: 0;
    right: 0;
    bottom: 0;
    padding: 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    pointer-events: none;
  }

  #overlayTitle {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 999px;
    background-color: rgba(0, 0, 0, 0.25);
    color: rgba(234, 240, 255, 0.9);
    align-self: flex-start;
  }

  #status {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 10px;
    background-color: rgba(0, 0, 0, 0.25);
    color: rgba(234, 240, 255, 0.75);
    align-self: flex-start;
  }

  #actions {
    display: flex;
    flex-direction: row;
    gap: 10px;
    justify-content: space-between;
  }

  #actionsNetwork {
    display: flex;
    flex-direction: row;
    gap: 10px;
    justify-content: space-between;
  }

  .btn {
    width: 172px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    background-color: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.10);
    color: #EAF0FF;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    user-select: none;
  }

  .btn.primary {
    background-image: linear-gradient(135deg, rgba(110, 140, 255, 0.95), rgba(57, 82, 255, 0.65));
    border: 1px solid rgba(145, 170, 255, 0.45);
  }

  .btn:hover {
    background-color: rgba(255, 255, 255, 0.14);
  }

  .btn:active {
    transform: translateY(1px);
    background-color: rgba(255, 255, 255, 0.18);
  }

  .btn.primary:hover {
    background-image: linear-gradient(135deg, rgba(130, 160, 255, 0.98), rgba(70, 100, 255, 0.78));
  }

  .btn.subtle {
    background-color: rgba(98, 120, 255, 0.12);
    border: 1px solid rgba(130, 155, 255, 0.24);
    color: rgba(228, 236, 255, 0.95);
  }

  .btn.subtle:hover {
    background-color: rgba(120, 145, 255, 0.20);
  }

  #demoAudio, #demoNetAudio {
    display: none;
  }
</style>

<script>
  const BILIBILI_ROOM_ID = "22603245";
  const NET_AUDIO_SRC = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";

  const video = document.querySelector("#demoVideo");
  const localAudio = document.querySelector("#demoAudio");
  const netAudio = document.querySelector("#demoNetAudio");

  const btnVideo = document.querySelector("#btnVideo");
  const btnAudio = document.querySelector("#btnAudio");
  const btnNetVideo = document.querySelector("#btnNetVideo");
  const btnNetAudio = document.querySelector("#btnNetAudio");
  const status = document.querySelector("#status");
  const timeDisplay = document.querySelector("#timeDisplay");

  const MODE_LOCAL_VIDEO = "localVideo";
  const MODE_LOCAL_AUDIO = "localAudio";
  const MODE_NET_VIDEO = "netVideo";
  const MODE_NET_AUDIO = "netAudio";
  let activeMode = "";
  let activePaused = true;

  // ── Pre-configure headers for Bilibili live streams ──
  // The stream URL is fetched dynamically via ApricityMediaHls.getBilibiliPlayUrl(),
  // but these headers are applied to the video element for FFmpeg to use.
  video.setUserAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/537.36");

  video.setHeaders(
          "accept: */*\r\n" +
          "accept-encoding: gzip, deflate, br\r\n" +
          "accept-language: zh-CN,zh;q=0.9,en;q=0.8\r\n" +
          "origin: https://live.bilibili.com\r\n" +
          "referer: https://live.bilibili.com/\r\n" +
          "sec-ch-ua: \"Microsoft Edge\";v=\"147\", \"Not.A/Brand\";v=\"8\", \"Chromium\";v=\"147\"\r\n" +
          "sec-ch-ua-mobile: ?0\r\n" +
          "sec-ch-ua-platform: \"Windows\"\r\n" +
          "sec-fetch-dest: empty\r\n" +
          "sec-fetch-mode: cors\r\n" +
          "sec-fetch-site: cross-site"
  );
  video.setNetworkOption("reconnect", "1");
  video.setNetworkOption("reconnect_streamed", "1");
  video.setNetworkOption("reconnect_delay_max", "2");

  // ── Media event listeners ──

  function fmtTime(sec) {
    if (sec < 0) return "--:--";
    var m = Math.floor(sec / 60);
    var s = Math.floor(sec % 60);
    return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  }

  video.addEventListener("play", function() {
    console.log("[ApricityMediaDemo] event: play");
  });

  video.addEventListener("pause", function() {
    console.log("[ApricityMediaDemo] event: pause");
  });

  video.addEventListener("ended", function() {
    console.log("[ApricityMediaDemo] event: ended");
    if (activeMode === MODE_LOCAL_VIDEO || activeMode === MODE_NET_VIDEO) {
      activePaused = true;
      updateStatus(modeText(activeMode, true), activeMode);
    }
  });

  video.addEventListener("timeupdate", function() {
    var cur = video.getCurrentTime();
    var dur = video.getDuration();
    timeDisplay.innerText = fmtTime(cur) + " / " + fmtTime(dur);
  });

  video.addEventListener("loadedmetadata", function() {
    console.log("[ApricityMediaDemo] event: loadedmetadata, duration=" + video.getDuration());
  });

  video.addEventListener("canplay", function() {
    console.log("[ApricityMediaDemo] event: canplay");
  });

  video.addEventListener("durationchange", function() {
    console.log("[ApricityMediaDemo] event: durationchange, duration=" + video.getDuration());
  });

  video.addEventListener("volumechange", function() {
    console.log("[ApricityMediaDemo] event: volumechange, volume=" + video.getVolume() + ", muted=" + video.isMuted());
  });

  video.addEventListener("error", function() {
    console.log("[ApricityMediaDemo] event: error");
    status.innerText = "播放出错";
  });

  // Also wire audio events for the local audio element
  localAudio.addEventListener("play", function() {
    console.log("[ApricityMediaDemo] audio event: play");
  });

  localAudio.addEventListener("pause", function() {
    console.log("[ApricityMediaDemo] audio event: pause");
  });

  localAudio.addEventListener("ended", function() {
    console.log("[ApricityMediaDemo] audio event: ended");
    if (activeMode === MODE_LOCAL_AUDIO) {
      activePaused = true;
      updateStatus(modeText(activeMode, true), activeMode);
    }
  });

  // ── Helper functions ──

  function stopAll() {
    video.pause();
    localAudio.pause();
    netAudio.pause();
  }

  function updateStatus(text, active) {
    status.innerText = text;
    btnVideo.setAttribute("class", active === "localVideo" ? "btn primary" : "btn");
    btnAudio.setAttribute("class", active === "localAudio" ? "btn primary" : "btn");
    btnNetVideo.setAttribute("class", active === "netVideo" ? "btn primary subtle" : "btn subtle");
    btnNetAudio.setAttribute("class", active === "netAudio" ? "btn primary subtle" : "btn subtle");
  }

  function applyNetworkAttrs(el) {
    if (!el) return;
    el.setAttribute("network-timeout-ms", "8000");
    el.setAttribute("network-buffer-kb", "2048");
    el.setAttribute("network-reconnect", "true");
    el.setAttribute("preload", "metadata");
    el.setAttribute("max-fps", "0");
    el.setAttribute("decode-width", "0");
    el.setAttribute("drop-frames", "true");
  }

  function modeText(mode, paused) {
    if (mode === MODE_LOCAL_VIDEO) return paused ? "本地视频已暂停" : "本地视频播放中";
    if (mode === MODE_LOCAL_AUDIO) return paused ? "本地音频已暂停" : "本地音频播放中";
    if (mode === MODE_NET_VIDEO) return paused ? "网络视频已暂停" : "网络视频播放中";
    if (mode === MODE_NET_AUDIO) return paused ? "网络音频已暂停" : "网络音频播放中";
    return "就绪";
  }

  function startMode(mode) {
    console.log("[ApricityMediaDemo] startMode", mode);
    stopAll();
    timeDisplay.innerText = "--:-- / --:--";

    if (mode === MODE_LOCAL_VIDEO) {
      video.setAttribute("src", "demo.mp4");
      video.setMuted(false);
      video.setLoop(true);
      video.play();
    } else if (mode === MODE_LOCAL_AUDIO) {
      localAudio.setAttribute("src", "demo.mp3");
      localAudio.setLoop(true);
      localAudio.play();
    } else if (mode === MODE_NET_VIDEO) {
      status.innerText = "正在获取直播流...";
      var streamUrl = ApricityMediaHls.getBilibiliPlayUrl(BILIBILI_ROOM_ID);
      if (streamUrl) {
        console.log("[ApricityMediaDemo] bilibili stream resolved: " + streamUrl);
        video.setAttribute("src", streamUrl);
        applyNetworkAttrs(video);
        video.setMuted(false);
        video.setLoop(false);
        video.play();
      } else {
        console.log("[ApricityMediaDemo] bilibili stream resolve FAILED for room " + BILIBILI_ROOM_ID);
        status.innerText = "获取直播流失败";
        activeMode = "";
        return;
      }
    } else if (mode === MODE_NET_AUDIO) {
      netAudio.setAttribute("src", NET_AUDIO_SRC);
      applyNetworkAttrs(netAudio);
      netAudio.setLoop(false);
      netAudio.play();
    }

    activeMode = mode;
    activePaused = false;
    updateStatus(modeText(mode, false), mode);
  }

  function toggleMode(mode) {
    console.log("[ApricityMediaDemo] toggleMode before", mode, "activeMode=", activeMode, "activePaused=", activePaused);
    if (activeMode === mode) {
      activePaused = !activePaused;

      if (mode === MODE_LOCAL_VIDEO || mode === MODE_NET_VIDEO) {
        if (activePaused) video.pause(); else video.play();
      } else if (mode === MODE_LOCAL_AUDIO) {
        if (activePaused) localAudio.pause(); else localAudio.play();
      } else if (mode === MODE_NET_AUDIO) {
        if (activePaused) netAudio.pause(); else netAudio.play();
      }

      updateStatus(modeText(mode, activePaused), mode);
      console.log("[ApricityMediaDemo] toggleMode pause", mode, "paused=", activePaused);
      return;
    }
    startMode(mode);
  }

  console.log("[ApricityMediaDemo] script loaded");

  btnVideo.addEventListener("mousedown", function() {
    console.log("[ApricityMediaDemo] click local video");
    toggleMode(MODE_LOCAL_VIDEO);
  });

  btnAudio.addEventListener("mousedown", function() {
    console.log("[ApricityMediaDemo] click local audio");
    toggleMode(MODE_LOCAL_AUDIO);
  });

  btnNetVideo.addEventListener("mousedown", function() {
    console.log("[ApricityMediaDemo] click net video");
    toggleMode(MODE_NET_VIDEO);
  });

  btnNetAudio.addEventListener("mousedown", function() {
    console.log("[ApricityMediaDemo] click net audio");
    toggleMode(MODE_NET_AUDIO);
  });

  stopAll();
  updateStatus("就绪", "");
</script>
