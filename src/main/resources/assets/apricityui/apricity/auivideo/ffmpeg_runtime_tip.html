<body>
  <div id="wrap">
    <div id="card">
      <div id="title">ApricityMedia</div>
      <div id="text">FFmpeg 运行时初始化失败，视频和音频功能暂不可用。</div>
      <div id="sub">请检查网络与下载权限，重进游戏会自动重试。</div>
      <div id="btn">我知道了</div>
    </div>
  </div>
</body>

<style>
  body {
    width: 100%;
    height: 100%;
    margin: 0;
  }

  #wrap {
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: center;
    pointer-events: auto;
    padding-top: 24px;
  }

  #card {
    width: 420px;
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background-color: rgba(14, 17, 24, 0.86);
    border: 1px solid rgba(255, 124, 124, 0.36);
    box-shadow: 0px 12px 28px rgba(0, 0, 0, 0.45);
  }

  #title {
    font-size: 14px;
    font-weight: 800;
    color: #FFD5D5;
  }

  #text {
    font-size: 12px;
    color: #F8EAEA;
  }

  #sub {
    font-size: 11px;
    color: rgba(248, 234, 234, 0.75);
  }

  #btn {
    margin-top: 2px;
    width: 94px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    background-color: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #F8EAEA;
    font-size: 11px;
    font-weight: 700;
    user-select: none;
    cursor: pointer;
  }
</style>

<script>
  const btn = document.querySelector("#btn");
  const wrap = document.querySelector("#wrap");
  btn.addEventListener("mousedown", () => {
    wrap.setAttribute("style", "display:none;");
  });
</script>
